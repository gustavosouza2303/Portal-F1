<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="./src/style.css">

<body>

    <div id="container_bannerLogin" class="banner">

        <source src="./src/Videos/F1intro2026.mp4" type="video/mp4">

    </video>
    <div id="container_inputs">
        <div id="cadastro">

                <h1>Portal F1</h1>
                <h2>Cadastro</h2>
            </div>
            <div>
                Nome: <br>
                <input type="text" id="ipt_login"> <br>

                Email: <br>

            </div>

                Senha: <br>

            <div>
                Confirmar Senha: <br>
                <input type="text" id="ipt_confirmSenha"> <br>
            </div>
            <div>
                <div id="divErro"></div>
            </div>
            
            <button onclick="cadastrar()">Cadastrar-se</button>
            <span>Já tem uma conta? Logue-se <a href="./login.html">Aqui</a>!</span>

        </div>
    </div>

    </div>
