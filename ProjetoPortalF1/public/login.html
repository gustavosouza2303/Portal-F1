<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/style.css">
    <script src="./src/script.js"></script>
    <script src="./src/sessao.js"></script>
</head>
<body>

    <div id="container_bannerLogin" class="banner">
        <video autoplay muted loop playsinline>
        <source src="./src/Videos/F1intro2026.mp4" type="video/mp4">
        Seu navegador não suporta vídeo.
    </video>
    <div id="container_inputs">
        <div id="login">
            <div id="tituloLogin">
                <h1>Portal F1</h1>
                <h2>Login</h2>
            </div>
            <div>
                E-mail: <br>
                <input type="text" id="ipt_login"> <br>
            </div>
            <div>
                Senha: <br>
                <input type="text" id="ipt_senha"> <br>
            </div>
            <div>
                <div id="divErro"></div>
            </div>

            <button type="button" onclick="login()">Logar</button>
            <span>Não tem uma conta? Cadastre-se <a href="./cadastro.html">Aqui</a>!</span>

        </div>
    </div>

    </div>


</body>
</html>

<script>
    function login() {

        var emailVar = ipt_login.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            divErro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location.href = "./home.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        divErro.style.display = "none"
    }
</script>
